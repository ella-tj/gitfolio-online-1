<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>GitHub Portfolio</title>
    <meta name="description" content="A portfolio website showcasing your GitHub work and contributions." />
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="GitHub Portfolio" />
    <meta property="og:description" content="A portfolio website showcasing your GitHub work and contributions." />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="GitHub Portfolio" />
    <meta property="twitter:description" content="A portfolio website showcasing your GitHub work and contributions." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins&family=Questrial&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css" />
  </head>

  <body>
    <div id="loading" role="status" aria-live="polite" aria-label="Loading portfolio content">
      <div id="skeleton" aria-hidden="true">
        <div class="skeleton-profile">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-name"></div>
          <div class="skeleton-bio"></div>
        </div>
        <div class="skeleton-content">
          <h1 class="skeleton-title"></h1>
          <div class="skeleton-grid">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="github"></div>
    <div id="profile" role="region" aria-label="User profile">
      <div id="profile_img"></div>
      <div id="username">
        <div id="fullname"></div>
      </div>
      <div id="userbio"></div>
      <div id="about"></div>
    </div>
    <div id="display" role="main">
      <div id="work" role="region" aria-label="Work projects">
        <h1>Work.</h1>
        <div class="projects" id="work_section" aria-live="polite"></div>
      </div>
      <div id="forks" style="display: none" role="region" aria-label="Forked projects">
        <h1>Forks.</h1>
        <div class="projects" id="forks_section"></div>
      </div>
      <div id="footer">
        <a href="https://github.com/wangningkai" target="_blank">made on earth by a human</a>
      </div>
    </div>
    <script type="text/javascript">
      setTimeout(function () {
        document.getElementById('loading').classList.add('animated')
        document.getElementById('loading').classList.add('fadeOut')
        setTimeout(function () {
          document.getElementById('loading').classList.remove('animated')
          document.getElementById('loading').classList.remove('fadeOut')
          document.getElementById('loading').style.display = 'none'
        }, 600)
      }, 600)
    </script>
  </body>
</html>
